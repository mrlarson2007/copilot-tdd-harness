name: Main Evals And Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional explicit release version (for example 1.2.3)
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Versioned Zip Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ github.event.inputs.release_version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "release_version must match MAJOR.MINOR.PATCH" >&2
              exit 1
            fi
            VERSION="$INPUT_VERSION"
          else
            LAST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)
            if [[ -z "$LAST_TAG" ]]; then
              VERSION="0.1.0"
            else
              BASE="${LAST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          TAG="v${VERSION}"
          ZIP_NAME="copilot-tdd-harness-${VERSION}.zip"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          zip -r "dist/${{ steps.version.outputs.zip_name }}" \
            plugin \
            scripts/install-tdd-harness.ps1 \
            scripts/install-tdd-harness.sh \
            scripts/run-evals.ps1 \
            README.md \
            LICENSE

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/${{ steps.version.outputs.zip_name }}
