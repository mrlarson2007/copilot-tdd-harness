# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: |
  TDD agent benchmark matrix (v2). Scores deterministic protocol-fidelity
  signals over run-summary JSON artifacts produced for the single `tdd` agent.

  The local benchmark provider reads pre-produced run-summary JSON files from
  ../fixtures/run-summaries/ so the scoring layer can be exercised without
  wiring promptfoo directly to Copilot runtime execution.

prompts:
  - file://./prompt.txt

providers:
  - id: file://./benchmark-provider.js
    label: tdd-agent-benchmark-provider

tests:
  - description: calculator-cli-go feature-add-subtract-command (clean RED-GREEN-COMMIT exemplar)
    threshold: 1
    vars:
      fixtureId: calculator-cli-go
      scenarioId: feature-add-subtract-command
      scenarioFamily: feature
      runMode: micro-cycle
      clarificationExpected: false
      summaryPath: ../fixtures/run-summaries/calculator-cli-go/feature-add-subtract-command.good.json
    assert:
      - type: javascript
        value: file://./assertions/run-summary-shape.js
        metric: schema_shape
      - type: javascript
        value: file://./assertions/protocol-fidelity.js
        metric: protocol_fidelity
      - type: javascript
        value: file://./assertions/commit-quality.js
        metric: commit_quality
      - type: javascript
        value: file://./assertions/clarification-expected.js
        metric: clarification

  - description: calculator-cli-go feature-add-subtract-command (TDD violation exemplar)
    threshold: 1
    vars:
      fixtureId: calculator-cli-go
      scenarioId: feature-add-subtract-command
      scenarioFamily: feature
      runMode: micro-cycle
      clarificationExpected: false
      summaryPath: ../fixtures/run-summaries/calculator-cli-go/feature-add-subtract-command.bad.json
    assert:
      - type: javascript
        value: file://./assertions/run-summary-shape.js
        metric: schema_shape
      - type: javascript
        value: file://./assertions/detects-production-before-red.js
        metric: detects_violation

outputPath:
  - results/promptfoo-benchmark.json