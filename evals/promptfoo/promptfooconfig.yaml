# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: |
  TDD agent benchmark matrix (v2). Scores deterministic protocol-fidelity
  signals over run-summary JSON artifacts produced from real disposable example
  repositories.

  The local benchmark provider prepares a disposable git workspace from a
  fixture source tree for each test case, runs the scenario inside that temp
  repository, persists generated summary and git evidence artifacts, and then
  returns the run summary for assertions. This keeps eval runs isolated so
  sample repos and local branches are not polluted by test edits or commits.

prompts:
  - file://./prompt.txt

providers:
  - id: file://./benchmark-provider.js
    label: tdd-agent-benchmark-provider

tests:
  - description: calculator-cli-go feature-add-subtract-command (clean RED-GREEN-COMMIT exemplar)
    threshold: 1
    vars:
      fixtureId: calculator-cli-go
      baselineId: clean
      scenarioId: feature-add-subtract-command
      scenarioFamily: feature
      runMode: micro-cycle
      taskPrompt: Add a subtract subcommand to the calc CLI using TDD.
      clarificationExpected: false
      fixtureSourcePath: ../fixtures/projects/calculator-cli-go/clean
      artifactOutputDir: ./results/run-artifacts
      scenarioModulePath: ../fixtures/scenarios/calculator-cli-go/feature-add-subtract-command.good.js
    assert:
      - type: javascript
        value: file://./assertions/run-summary-shape.js
        metric: schema_shape
      - type: javascript
        value: file://./assertions/protocol-fidelity.js
        metric: protocol_fidelity
      - type: javascript
        value: file://./assertions/commit-quality.js
        metric: commit_quality
      - type: javascript
        value: file://./assertions/clarification-expected.js
        metric: clarification

  - description: calculator-cli-go feature-add-subtract-command (TDD violation exemplar)
    threshold: 1
    vars:
      fixtureId: calculator-cli-go
      baselineId: clean
      scenarioId: feature-add-subtract-command
      scenarioFamily: feature
      runMode: micro-cycle
      taskPrompt: Add a subtract subcommand to the calc CLI using TDD.
      clarificationExpected: false
      fixtureSourcePath: ../fixtures/projects/calculator-cli-go/clean
      artifactOutputDir: ./results/run-artifacts
      scenarioModulePath: ../fixtures/scenarios/calculator-cli-go/feature-add-subtract-command.bad.js
    assert:
      - type: javascript
        value: file://./assertions/run-summary-shape.js
        metric: schema_shape
      - type: javascript
        value: file://./assertions/detects-production-before-red.js
        metric: detects_violation
      - type: javascript
        value: file://./assertions/detects-split-commit.js
        metric: detects_split_commit

